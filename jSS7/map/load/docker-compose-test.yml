services:
  server:
    image: jss7-sctp:latest
    container_name: jss7-server
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cd /opt/jss7-load-test
        rm -rf server client
        mkdir -p server client
        exec ant -f mo_sms_build.xml server 
          -Dtest.server.channelType=tcp 
          -Dtest.server.hostIp=0.0.0.0 
          -Dtest.server.hostPort=8011 
          -Dtest.server.peerIp=client 
          -Dtest.server.peerPort=8012
    environment:
      - TEST_SERVER_CHANNEL_TYPE=tcp
      - TEST_SERVER_HOST_IP=0.0.0.0
      - TEST_SERVER_HOST_PORT=8011
      - TEST_SERVER_PEER_IP=client
      - TEST_SERVER_PEER_PORT=8012
    networks:
      - jss7-net
    ports:
      - "8011:8011"

  client:
    image: jss7-sctp:latest
    container_name: jss7-client
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sleep 10
        cd /opt/jss7-load-test
        exec ant -f mo_sms_build.xml client 
          -Dtest.client.numOfDialogs=1000 
          -Dtest.client.concurrentDialog=100 
          -Dtest.client.channelType=tcp 
          -Dtest.client.hostIp=server 
          -Dtest.client.hostPort=8011
    environment:
      - TEST_CLIENT_CHANNEL_TYPE=tcp
      - TEST_CLIENT_NUM_OF_DIALOGS=1000
      - TEST_CLIENT_CONCURRENT_DIALOG=100
      - TEST_CLIENT_HOST_IP=server
      - TEST_CLIENT_HOST_PORT=8011
    networks:
      - jss7-net
    depends_on:
      - server

networks:
  jss7-net:
    driver: bridge
