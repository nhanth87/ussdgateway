version: '3.8'

services:
  # jSS7 MAP Load Test Server
  jss7-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: jss7-map-load-test:latest
    container_name: jss7-mo-sms-server
    command: server
    ports:
      - "8011:8011"
      - "8012:8012"
    environment:
      # Server Configuration
      TEST_SERVER_CHANNEL_TYPE: sctp
      TEST_SERVER_HOST_IP: 0.0.0.0
      TEST_SERVER_HOST_PORT: 8011
      TEST_SERVER_EXTRA_HOST_ADDRESS: -1
      TEST_SERVER_PEER_IP: 127.0.0.1
      TEST_SERVER_PEER_PORT: 8012
      TEST_SERVER_AS_FUNCTIONALITY: IPSP
      TEST_SERVER_RC: 101
      TEST_SERVER_NA: 102
      TEST_SERVER_ORIGINATING_PC: 1
      TEST_SERVER_DESTINATION_PC: 2
      TEST_SERVER_SI: 3
      TEST_SERVER_NI: 2
      TEST_SERVER_SSN: 8
      TEST_SERVER_REMOTE_SSN: 8
      # JVM Options
      JVM_OPTS: "-Xms2048m -Xmx2048m -Xmn128m -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=256m -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError"
    networks:
      - jss7-test-net
    volumes:
      - server-logs:/opt/jss7-load-test/server
    healthcheck:
      test: ["CMD", "test", "-f", "/opt/jss7-load-test/log4j-server.log"]
      interval: 10s
      timeout: 5s
      retries: 5

  # jSS7 MAP Load Test Client
  jss7-client:
    build:
      context: .
      dockerfile: Dockerfile
    image: jss7-map-load-test:latest
    container_name: jss7-mo-sms-client
    command: client
    depends_on:
      jss7-server:
        condition: service_healthy
    environment:
      # Client Configuration
      TEST_CLIENT_NUM_OF_DIALOGS: 10000
      TEST_CLIENT_CONCURRENT_DIALOG: 100
      TEST_CLIENT_CHANNEL_TYPE: sctp
      TEST_CLIENT_HOST_IP: jss7-server
      TEST_CLIENT_HOST_PORT: 8011
      TEST_CLIENT_EXTRA_HOST_ADDRESS: -1
      TEST_CLIENT_PEER_IP: jss7-server
      TEST_CLIENT_PEER_PORT: 8012
      TEST_CLIENT_AS_FUNCTIONALITY: IPSP
      TEST_CLIENT_RC: 101
      TEST_CLIENT_NA: 102
      TEST_CLIENT_ORIGINATING_PC: 1
      TEST_CLIENT_DESTINATION_PC: 2
      TEST_CLIENT_SI: 3
      TEST_CLIENT_NI: 2
      TEST_CLIENT_SSN: 8
      TEST_CLIENT_REMOTE_SSN: 8
      TEST_CLIENT_CLIENT_ADDRESS: 1111112
      TEST_CLIENT_SERVER_ADDRESS: 9960639999
      # JVM Options
      JVM_OPTS: "-Xms2048m -Xmx2048m -Xmn128m -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=256m -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError"
    networks:
      - jss7-test-net
    volumes:
      - client-logs:/opt/jss7-load-test/client

networks:
  jss7-test-net:
    driver: bridge

volumes:
  server-logs:
  client-logs:
